<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JRPG Battle</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f0f1a;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #f0f0f0;
    }

    .battle-screen {
      width: 640px;
      border: 4px solid #4a4a6a;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
    }

    .arena {
      height: 320px;
      background: linear-gradient(180deg, #2a3a5c 0%, #1a2540 60%, #3d5a3d 100%);
      padding: 24px 32px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .combatant {
      background: rgba(0, 0, 0, 0.45);
      border: 2px solid #6a7a9a;
      border-radius: 8px;
      padding: 16px 24px;
      min-width: 180px;
    }

    .combatant.enemy {
      border-color: #9a4a4a;
    }

    .combatant.player {
      border-color: #4a7a9a;
      align-self: flex-end;
    }

    .combatant-name {
      font-size: 1.25rem;
      font-weight: bold;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }

    .combatant.enemy .combatant-name {
      color: #ff8888;
    }

    .combatant.player .combatant-name {
      color: #88ccff;
    }

    .combatant-hp {
      font-size: 1rem;
      color: #ccc;
    }

    .combatant-hp span {
      color: #fff;
      font-weight: bold;
    }

    .ui-menu {
      background: #1a1a2e;
      border-top: 4px solid #4a4a6a;
      padding: 20px 32px 28px;
    }

    .menu-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #888;
      margin-bottom: 16px;
    }

    .command-row {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }

    #attackBtn {
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: bold;
      background: #3a5a8a;
      color: #fff;
      border: 2px solid #5a8aba;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.05em;
    }

    #attackBtn:disabled {
      background: #2a2a3a;
      color: #666;
      border-color: #444;
      cursor: not-allowed;
    }

    #attackBtn:not(:disabled):hover {
      background: #4a7aba;
    }

    .atb-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .atb-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .atb-label {
      width: 70px;
      font-size: 0.9rem;
      color: #aaa;
    }

    progress {
      flex: 1;
      height: 20px;
      border: none;
      border-radius: 4px;
      overflow: hidden;
    }

    progress::-webkit-progress-bar {
      background: #2a2a3a;
      border-radius: 4px;
    }

    #playerAtb::-webkit-progress-value {
      background: linear-gradient(90deg, #2a6aaa, #4a9aff);
      border-radius: 4px;
    }

    #enemyAtb::-webkit-progress-value {
      background: linear-gradient(90deg, #aa2a2a, #ff4a4a);
      border-radius: 4px;
    }

    progress::-moz-progress-bar {
      border-radius: 4px;
    }

    #playerAtb::-moz-progress-bar {
      background: linear-gradient(90deg, #2a6aaa, #4a9aff);
    }

    #enemyAtb::-moz-progress-bar {
      background: linear-gradient(90deg, #aa2a2a, #ff4a4a);
    }
  </style>
</head>
<body>
  <div class="battle-screen">
    <div class="arena">
      <div class="combatant enemy">
        <div class="combatant-name" id="enemyName">Goblin</div>
        <div class="combatant-hp">HP: <span id="enemyHp">50</span></div>
      </div>
      <div class="combatant player">
        <div class="combatant-name" id="playerName">Player</div>
        <div class="combatant-hp">HP: <span id="playerHp">100</span></div>
      </div>
    </div>

    <div class="ui-menu">
      <div class="menu-title">Commands</div>
      <div class="command-row">
        <button id="attackBtn" disabled>Attack</button>
      </div>

      <div class="atb-section">
        <div class="atb-row">
          <span class="atb-label">Player</span>
          <progress id="playerAtb" max="100" value="0"></progress>
        </div>
        <div class="atb-row">
          <span class="atb-label">Enemy</span>
          <progress id="enemyAtb" max="100" value="0"></progress>
        </div>
      </div>
    </div>
  </div>

  <script src="battle.js"></script>
</body>
</html>
